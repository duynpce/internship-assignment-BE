spring:
  application:
    name: ticket-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_db}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_ACCESS_SECRET}

server:
  port: 8083
  servlet:
    context-path: /api/v1/tickets

app:
  auth-service-url: ${AUTH_SERVICE_URL:http://auth-service:8084}

camunda:
  bpm:
    generic-properties:
      properties:
        historyTimeToLive: 30  # days, adjust as needed