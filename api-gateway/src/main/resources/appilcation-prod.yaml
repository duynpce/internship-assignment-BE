spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://auth-service:8084
            predicates:
              - Path=/api/v1/auth/**
          - id: user-service
            uri: http://user-service:8081
            predicates:
              - Path=/api/v1/users/**
          - id: report-service
            uri: http://report-service:8082
            predicates:
              - Path=/api/v1/reports/**
          - id: ticket-service
            uri: http://ticket-service:8083
            predicates:
              - Path=/api/v1/tickets/**

server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
